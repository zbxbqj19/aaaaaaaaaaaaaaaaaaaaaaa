<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>랩실/온라인실 예약</title>

<style>
body { font-family: sans-serif; background:#f4f6fa; }
.container {
  max-width:500px; margin:auto; background:white;
  padding:20px; border-radius:12px;
}
input, select, textarea, button {
  width:100%; padding:12px; margin:8px 0;
}
button { background:#2563eb; color:white; border:none; }
.status { text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h3>예약 시스템</h3>

<input id="name" placeholder="이름">
<input id="studentId" placeholder="학번">
<input type="date" id="date">

<select id="period" onchange="checkRemain()">
  <option value="7교시">7교시</option>
  <option value="8교시">8교시</option>
</select>

<select id="space" onchange="checkRemain()">
  <option value="랩실1">랩실1</option>
  <option value="랩실2">랩실2</option>
  <option value="랩실3">랩실3</option>
  <option value="랩실4">랩실4</option>
  <option value="온라인실">온라인실</option>
</select>

<div id="remain">잔여 좌석: -</div>

<input type="number" id="people" placeholder="인원수 (최대 8)">
<textarea id="reason" placeholder="사유"></textarea>

<button onclick="apply()">신청</button>

<div class="status" id="msg"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwOJKLW0VKEifas3cjKaYSDcIm3He-RdiWUmcGZ47LMmdqwGCIm5H5z3h00kYzdqspW/exec";

// 잔여 좌석 확인
function checkRemain() {
  if (!date.value) return;

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "status",
      date: date.value,
      period: period.value,
      space: space.value
    })
  })
  .then(r => r.json())
  .then(d => {
    remain.innerText = "잔여 좌석: " + d.remain;
  })
  .catch(() => {
    remain.innerText = "조회 실패";
  });
}

// 신청
function apply() {
  if (!name.value || !studentId.value || !date.value || !reason.value) {
    alert("모든 항목을 입력하세요");
    return;
  }

  if (people.value > 8) {
    alert("최대 8명까지 가능합니다");
    return;
  }

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "apply",
      name: name.value,
      studentId: studentId.value,
      date: date.value,
      period: period.value,
      space: space.value,
      people: people.value,
      reason: reason.value
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.status === "success") {
      msg.innerText = "신청 완료 (관리자 승인 대기)";
    } else if (d.status === "duplicate") {
      msg.innerText = "이미 해당 시간에 신청됨";
    } else if (d.status === "full") {
      msg.innerText = "정원 초과";
    } else {
      msg.innerText = "오류 발생";
    }
  })
  .catch(() => {
    msg.innerText = "서버 연결 실패";
  });
}
</script>

</body>
</html>
